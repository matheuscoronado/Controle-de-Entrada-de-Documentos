<div id="erd" style="padding: 1rem 0; background: #ffffff;"></div>

<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';

mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  themeVariables: {
    primaryColor: '#f9fafb',
    primaryBorderColor: '#333333',
    primaryTextColor: '#111111',

    lineColor: '#555555',

    secondaryColor: '#ffffff',
    tertiaryColor: '#f3f4f6',

    fontSize: '14px',
    fontFamily: 'Arial, sans-serif'
  }
});

const diagram = `erDiagram
  USUARIO {
    int id PK
    string nome
    string email
    string senha_hash
    string perfil
    string status
    timestamp criado_em
    timestamp atualizado_em
  }

  TIPO_DOCUMENTO {
    int id PK
    string nome
    string descricao
    string status
    timestamp criado_em
  }

  DOCUMENTO {
    int id PK
    string numero_protocolo
    int tipo_documento_id FK
    int usuario_registro_id FK
    string remetente
    string assunto
    string descricao
    string setor_destino
    string status
    timestamp data_recebimento
    timestamp criado_em
    timestamp atualizado_em
  }

  HISTORICO_MOVIMENTACAO {
    int id PK
    int documento_id FK
    int usuario_id FK
    string status_anterior
    string status_novo
    string observacoes
    timestamp data_hora
  }

  ARQUIVO_ANEXO {
    int id PK
    int documento_id FK
    string nome_arquivo
    string caminho_arquivo
    string tipo_mime
    int tamanho_bytes
    timestamp enviado_em
  }

  LOG_AUDITORIA {
    int id PK
    int usuario_id FK
    string acao
    string tabela_afetada
    int registro_id
    string ip_origem
    timestamp data_hora
  }

  USUARIO ||--o{ DOCUMENTO : registra
  TIPO_DOCUMENTO ||--o{ DOCUMENTO : classifica
  DOCUMENTO ||--o{ HISTORICO_MOVIMENTACAO : possui
  USUARIO ||--o{ HISTORICO_MOVIMENTACAO : realiza
  DOCUMENTO ||--o{ ARQUIVO_ANEXO : contem
  USUARIO ||--o{ LOG_AUDITORIA : gera
`;

const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;
</script>
